<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>numbering.pro - 넘버링 달인, 그림빵 장인 되기</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Aggressively disable Vite HMR
      window.__VITE_HMR__ = false;
      window.__VITE_HMR_HOST__ = null;
      window.__VITE_HMR_PROTOCOL__ = null;
      window.__VITE_HMR_PORT__ = null;
      window.__VITE_HMR_DIRECT__ = false;
      
      // Intercept WebSocket to prevent HMR connections
      const OriginalWebSocket = window.WebSocket;
      window.WebSocket = class extends OriginalWebSocket {
        constructor(url, ...args) {
          if (typeof url === 'string' && (url.includes('ws://') || url.includes('wss://'))) {
            console.warn('[HMR Disabled] WebSocket connection blocked:', url);
            throw new Error('WebSocket disabled for HMR');
          }
          super(url, ...args);
        }
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
    
    <!-- Google Analytics GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA4_MEASUREMENT_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '%VITE_GA4_MEASUREMENT_ID%', {
        'anonymize_ip': true,
        'allow_google_signals': false
      });
    </script>
  </body>

</html>
